version: 1.0.5

cache: true

endpoints:
  custom:
    - name: "Gemini / Vertex AI (Google)"
      apiKey: "${GEMINI_API_KEY}"
      baseURL: "https://generativelanguage.googleapis.com/v1beta"
      models:
        default: ["gemini-3.1-pro", "gemini-1.5-pro", "gemini-1.5-flash"]
        fetch: true
      titleConvo: true
      titleModel: "gemini-1.5-flash"
      summarize: true
      modelDisplayLabel: "Vertex AI"

    - name: "AIMS Native Swarm (Internal)"
      apiKey: "${ACHEEVY_INTERNAL_KEY}"
      baseURL: "https://api.myclaw.foai.cloud/v1/acheevy"
      models:
        default: ["ACHEEVY-Orchestrator", "SME_NotebookLM_Ang", "SME_Paperform_Ang", "Guide_Ang"]
        fetch: false
      titleConvo: true
      titleModel: "ACHEEVY-Orchestrator"
      modelDisplayLabel: "Boomer_Ang Swarm"

registration:
  socialLogins: ["google", "github"]
  # Strict policy: Only allowed users can enter OpenClaw
  allowEmails: ["asg@achievemor.io"]

rateLimits:
  fileUploads:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 1000
    userWindowInMinutes: 60

# Plugins and Tools integration (Exposing MyClaw Internal APIs to OpenClaw Agents)
plugins:
  creds: true

# ════════════════════════════════════════════════════════════════
# VOICE-FIRST: STT + TTS Configuration (Chicken Hawk Audio Layer)
# ════════════════════════════════════════════════════════════════
speech:
  tts:
    # OpenAI-compatible TTS (works with any OpenAI-compatible endpoint)
    openai:
      apiKey: "${OPENAI_API_KEY}"
      model: "tts-1"
      voices: ["alloy", "echo", "fable", "onyx", "nova", "shimmer"]
    # ElevenLabs TTS (premium voice quality)
    elevenlabs:
      apiKey: "${ELEVENLABS_API_KEY}"
      model: "eleven_multilingual_v2"
      voices: ["rachel", "drew", "clyde", "paul", "domi", "dave"]
  stt:
    openai:
      apiKey: "${OPENAI_API_KEY}"
      model: "whisper-1"

# Interface: Expose the microphone + speaker UI controls
interface:
  endpointsMenu: true
  speechTab: true
  # Allow all endpoints to use speech
  parameters:
    speechToText: true
    textToSpeech: true
