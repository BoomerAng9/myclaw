# =============================================================================
# VPS2 default server block — public entry point
# Domain: srv1318308.hstgr.cloud  |  IP: 31.97.138.45
# =============================================================================

# ─── Health check endpoint (plain HTTP) ─────────────────────────────────────
server {
    listen 80 default_server;
    server_name srv1318308.hstgr.cloud 31.97.138.45;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health probe (used by docker HEALTHCHECK + VPS1 monitoring)
    location = /health {
        access_log off;
        return 200 '{"status":"ok","host":"vps2"}';
        add_header Content-Type application/json;
    }

    # Fallback response (TLS not configured in this stack yet)
    location / {
        return 200 'A.I.M.S. VPS2 nginx is running';
        add_header Content-Type text/plain;
    }
}

# ─── OpenSandbox API — internal WireGuard only ───────────────────────────────
# VPS1 hits this as http://10.0.0.2:4400 directly; no nginx layer needed.

# ─── Plug Engine API — internal WireGuard only ──────────────────────────────
# VPS1 hits this as http://10.0.0.2:4200 directly.

# ─── Dynamic plug reverse proxy ─────────────────────────────────────────────
# Each plug gets an upstream written to /etc/nginx/plugs/<id>.conf
# by plug-engine.  Route: /plug/<id>/  → upstream plug_<id>
server {
    listen 80;
    server_name plugmein.cloud www.plugmein.cloud;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    # Match /plug/<plugId>/...
    location ~ ^/plug/(?<plug_id>[a-zA-Z0-9_-]+)(/.*)?$ {
        limit_req zone=api burst=60 nodelay;

        # upstream block written by plug-engine as plug_<id>
        proxy_pass http://plug_$plug_id$2$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Serve ACHEEVY + II-Agent experience in-place on plugmein.cloud
    location / {
        proxy_pass https://10.0.0.1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name off;
        proxy_ssl_verify off;
        proxy_read_timeout 300s;
    }
}
