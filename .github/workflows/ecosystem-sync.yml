# AIMS Ecosystem Sync — Satellite Node
# Notifies the AIMS hub when this node's manifest changes
name: Ecosystem Sync

on:
  push:
    paths:
      - 'ecosystem.node.json'
    branches:
      - main

jobs:
  notify-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read node manifest
        id: manifest
        run: |
          echo "node_id=$(jq -r '.nodeId' ecosystem.node.json)" >> $GITHUB_OUTPUT
          echo "role=$(jq -r '.role' ecosystem.node.json)" >> $GITHUB_OUTPUT

      - name: Notify AIMS hub
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.ECOSYSTEM_TOKEN }}
          repository: BoomerAng9/AIMS
          event-type: ecosystem-node-updated
          client-payload: |
            {
              "nodeId": "${{ steps.manifest.outputs.node_id }}",
              "role": "${{ steps.manifest.outputs.role }}",
              "repo": "${{ github.repository }}",
              "sha": "${{ github.sha }}"
            }
