services:
  myclaw:
    build: .
    restart: unless-stopped
    ports:
      - "8090:80"
    labels:
      - traefik.enable=true
      - traefik.http.routers.myclaw.rule=Host(`myclaw.foai.cloud`)
      - traefik.http.routers.myclaw.entrypoints=websecure
      - traefik.http.routers.myclaw.tls.certresolver=letsencrypt
      - traefik.http.services.myclaw.loadbalancer.server.port=80

  studio:
    build:
      context: ./acheevy-studio
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.myclawstudio.rule=Host(`studio.myclaw.foai.cloud`)
      - traefik.http.routers.myclawstudio.entrypoints=websecure
      - traefik.http.routers.myclawstudio.tls.certresolver=letsencrypt
      - traefik.http.services.myclawstudio.loadbalancer.server.port=3000

  okai:
    build:
      context: ./okai
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./okai/.env.local
    ports:
      - "3001:3000"
    volumes:
      - okai-data:/app/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.okai.rule=Host(`okai.foai.cloud`)
      - traefik.http.routers.okai.entrypoints=websecure
      - traefik.http.routers.okai.tls.certresolver=letsencrypt
      - traefik.http.services.okai.loadbalancer.server.port=3000

volumes:
  okai-data:
